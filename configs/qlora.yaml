# Phase 2 — QLoRA fine-tuning
# Hardware: RTX 4090 (24GB VRAM)
#
# Same as lora_baseline.yaml but with 4-bit NF4 quantization.
# 4-bit LLaMA 3 8B takes ~4.5GB, leaving ~19GB headroom on the 4090.
# This allows batch_size=8 (vs 2 in full LoRA) for faster training.

# ── Model ──────────────────────────────────────
model_name: "meta-llama/Meta-Llama-3-8B-Instruct"
max_seq_length: 512

# ── Quantization (QLoRA-specific) ──────────────
load_in_4bit: true
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"
bnb_4bit_use_double_quant: true

# ── LoRA ───────────────────────────────────────
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ── Training ───────────────────────────────────
# Full 5-epoch run for Phase 2
# batch_size=8 x grad_accum=4 = 32 effective (same as paper, faster on 4090)
learning_rate: 3.0e-5
per_device_train_batch_size: 8
gradient_accumulation_steps: 4   # effective batch = 32
num_train_epochs: 5
warmup_ratio: 0.03
lr_scheduler_type: "cosine"
bf16: true
logging_steps: 50
save_strategy: "epoch"
seed: 42

# ── Slerp merge ────────────────────────────────
slerp_t: 0.5

# ── Output ─────────────────────────────────────
output_dir: "outputs/checkpoints/qlora"
